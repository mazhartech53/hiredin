{% extends "base.html" %}
{% block title %}Login — HiredIn{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-logo">
                            <span class="logo-icon">H</span>
                            <span class="logo-text">HiredIn</span>
                        </div>
                        <h2>Welcome Back</h2>
                        <p>Login to your HiredIn account to access your resumes</p>
                    </div>
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label class="form-label">Email or Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" name="login_input" class="form-control" placeholder="Enter email or username" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                                <button type="button" class="input-group-text eye-btn" onclick="togglePassword('loginPassword', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3 d-flex justify-content-between">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-primary">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>
                    <div class="auth-divider">
                        <span>or</span>
                    </div>
                    <div class="auth-social">
                        <button class="btn btn-outline-secondary w-100">
                            <i class="fab fa-google me-2"></i>Continue with Google
                        </button>
                    </div>
                    <div class="auth-footer">
                        <p>Don't have an account? <a href="{{ url_for('register') }}">Create Account</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
